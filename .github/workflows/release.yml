name: Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    name: Upload Release Asset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build project
        run: |
          mkdir suwayomi_dl.koplugin
          # Copy everything except the directory itself and git files
          rsync -av --exclude='suwayomi_dl.koplugin' --exclude='.git' --exclude='.github' ./ suwayomi_dl.koplugin/
          zip -r suwayomi_dl.koplugin.zip suwayomi_dl.koplugin/

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: suwayomi_dl.koplugin.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
