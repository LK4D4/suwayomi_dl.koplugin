name: Test

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Lua and LuaRocks
      run: |
        sudo apt-get update
        sudo apt-get install -y lua5.1 luarocks
        lua5.1 -v
        luarocks --version

    - name: Install dependencies
      run: |
        luarocks install --local busted
        luarocks install --local dkjson

    - name: Add LuaRocks user bin to PATH
      run: echo "$HOME/.luarocks/bin" >> "$GITHUB_PATH"

    - name: Run tests
      run: busted spec

    - name: Check Lua syntax
      run: luac5.1 -p main.lua suwayomi_api.lua suwayomi_downloader.lua suwayomi_settings.lua suwayomi_ui.lua _meta.lua
