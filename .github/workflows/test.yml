name: Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Lua
      uses: leafo/gh-actions-lua@v9
      with:
        luaVersion: "5.1"
        
    - name: Setup Luarocks
      uses: leafo/gh-actions-luarocks@v4
      
    - name: Install dependencies
      run: |
        luarocks install busted
        
    - name: Run tests
      run: busted
